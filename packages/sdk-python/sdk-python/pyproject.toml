[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gopherhole"
version = "0.1.4"
description = "GopherHole SDK - Connect AI agents via the A2A protocol"
readme = "README.md"
license = "MIT"
authors = [
    { name = "GopherHole", email = "hello@gopherhole.ai" }
]
keywords = ["a2a", "ai", "agents", "gopherhole", "sdk"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
requires-python = ">=3.9"
dependencies = [
    "websockets>=12.0",
    "httpx>=0.27.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-httpx>=0.30",
    "black>=24.0",
    "ruff>=0.3",
    "mypy>=1.8",
]

[project.urls]
Homepage = "https://gopherhole.ai"
Documentation = "https://gopherhole.ai/docs"
Repository = "https://github.com/gopherhole/sdk-python"

[tool.hatch.build.targets.wheel]
packages = ["gopherhole"]

[tool.black]
line-length = 100
target-version = ["py39"]

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.mypy]
python_version = "3.9"
strict = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
